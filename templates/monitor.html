<!DOCTYPE html>
<html>
<head>
    <title>YOLO Monitor</title>
</head>
<body style="margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh;">
    <img id="yolo-view" style="max-height:100vh; max-width:100%; object-fit:contain;">
    <script>
    setInterval(async () => {
        const res = await fetch('/video')
        const data = await res.json()
        if(data.frame)
            document.getElementById('yolo-view').src = 'data:image/jpeg;base64,' + data.frame
    }, 100)
    </script>
</body>
</html>
