<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Gym Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="dashboard-shell">
    <aside class="sidebar" aria-label="Smart Gym navigation">
      <div class="brand">
        <span class="brand-mark">S</span>
        <span class="brand-name">Smart Gym</span>
      </div>

      <nav class="side-nav">
        <a class="nav-link active" href="/">
          <span class="nav-icon">▦</span>
          <span>대시보드</span>
        </a>
        <a class="nav-link" href="/monitor">
          <span class="nav-icon">◆</span>
          <span>장비 관리</span>
        </a>
        <a class="nav-link" href="/">
          <span class="nav-icon">◉</span>
          <span>사용자 현황</span>
        </a>
        <a class="nav-link" href="/">
          <span class="nav-icon">◌</span>
          <span>유지보수</span>
        </a>
        <a class="nav-link" href="/">
          <span class="nav-icon">▣</span>
          <span>리포트</span>
        </a>
      </nav>

      <a class="nav-link side-settings" href="/">
        <span class="nav-icon">⚙</span>
        <span>설정</span>
      </a>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <div class="topbar-title">
          <span class="topbar-kicker">Live Operations</span>
          <h1>스마트짐 관제 대시보드</h1>
        </div>
        <div class="topbar-actions">
          <div class="connection-badge loading" id="connBadge">
            <span class="conn-dot"></span>
            <span class="conn-label" id="connLabel">시스템 확인 중</span>
          </div>
          <div class="time-block">
            <span class="clock" id="clock">--:--:--</span>
            <span class="sync-label">실시간 반영</span>
          </div>
          <button class="icon-button" type="button" aria-label="알림">●</button>
          <button class="icon-button" type="button" aria-label="계정">♟</button>
        </div>
      </header>

      <section class="summary-grid" aria-label="요약 현황">
        <article class="summary-card">
          <div class="summary-icon">▥</div>
          <div>
            <span class="summary-label">전체 런닝머신</span>
            <strong class="summary-value" id="statTotal">4 대</strong>
          </div>
        </article>
        <article class="summary-card warning">
          <div class="summary-icon">●</div>
          <div>
            <span class="summary-label">사용 중</span>
            <strong class="summary-value" id="statInUse">- 대</strong>
          </div>
        </article>
        <article class="summary-card success">
          <div class="summary-icon">✓</div>
          <div>
            <span class="summary-label">사용 가능</span>
            <strong class="summary-value" id="statAvailable">- 대</strong>
          </div>
        </article>
      </section>

      <section class="content-section treadmill-section">
        <div class="section-header">
          <h2 class="section-title">
            <span class="section-icon">◆</span>
            런닝머신 현황
          </h2>
          <div class="section-badge" id="tmBadge">집계 중</div>
        </div>
        <div class="treadmill-grid" id="tmGrid"></div>
      </section>

      <section class="lower-grid">
        <article class="content-section towel-section">
          <div class="section-header">
            <h2 class="section-title">
              <span class="section-icon">▥</span>
              수건 디스펜서 현황
            </h2>
          </div>
          <div class="towel-list" id="towelList"></div>
        </article>

        <article class="content-section equipment-section">
          <div class="section-header">
            <h2 class="section-title">
              <span class="section-icon">▣</span>
              기타 장비 현황
            </h2>
          </div>
          <div class="equip-grid" id="equipGrid"></div>
        </article>
      </section>
    </main>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
